<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Client Presentation
  </title>

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css">

  <!-- Font Awesome -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- Presentation Container -->

  <div class="presentation">

    <!-- Slide -->

    <div class="slide active">

      <i class="fa-solid fa-chart-line"></i>

      <h1>
        Business Growth
      </h1>

      <p>
        Modern client presentation
        for project showcase.
      </p>

    </div>

    <!-- Slide -->

    <div class="slide">

      <i class="fa-solid fa-laptop-code"></i>

      <h1>
        Web Development
      </h1>

      <p>
        Responsive UI/UX solutions
        for modern businesses.
      </p>

    </div>

    <!-- Slide -->

    <div class="slide">

      <i class="fa-solid fa-bullhorn"></i>

      <h1>
        Marketing Strategy
      </h1>

      <p>
        Creative branding and
        marketing presentation.
      </p>

    </div>

    <!-- Button -->

    <button id="nextBtn">
      Next Slide
    </button>

  </div>

  <!-- JavaScript -->

  <script src="script.js"></script>

</body>

</html>
